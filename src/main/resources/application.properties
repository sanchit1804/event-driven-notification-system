# ===============================
# Server Configuration
# ===============================
server.port=8080


# ===============================
# H2 Database Configuration
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=false


# ===============================
# H2 Console
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# ===============================
# Spring Boot Banner
# ===============================
spring.main.banner-mode=off


# ===============================
# Logging Configuration
# ===============================
logging.level.root=WARN

# Show only your application logs
logging.level.com.project=INFO

# Hide framework logs
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=ERROR


# ===============================
# Kafka Configuration
# ===============================

# Kafka Server
spring.kafka.bootstrap-servers=localhost:9092


# ===============================
# Kafka Producer Configuration
# ===============================

# Key is String (orderId)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Order object converted to JSON
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# ===============================
# Kafka Consumer Configuration
# ===============================

spring.kafka.consumer.group-id=notification-group

spring.kafka.consumer.auto-offset-reset=earliest

# Key deserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# JSON back to Java object
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Allow your event classes
spring.kafka.consumer.properties.spring.json.trusted.packages=com.project.*


# ===============================
# Kafka Topic
# ===============================
kafka.topic.name=order-events